<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المالك - WorkHub Egypt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h3>إعدادات المالك</h3>
            <ul>
                <li>تغيير اسم الموقع</li>
                <li>تغيير اللوجو</li>
                <li>تغيير الألوان</li>
                <li>إدارة المديرين</li>
                <li>النسخ الاحتياطي</li>
            </ul>
        </aside>
        <main class="content">
            <h1>إعدادات الموقع العامة</h1>
            <div class="setting-item">
                <label>اسم الموقع:</label>
                <input type="text" value="WorkHub Egypt">
                <button class="btn btn-primary">حفظ</button>
            </div>
            <div class="setting-item">
                <label>شريط الأخبار:</label>
                <textarea>تم إضافة أكثر من 300 وظيفة جديدة اليوم.</textarea>
                <button class="btn btn-primary">حفظ</button>
            </div>
        </main>
    </div>
</body>
</html>
